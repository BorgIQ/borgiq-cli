name: release

on:
  push:
    branches: [main]

# Why action references are pinned to commit SHAs (not `@vN`):
#   1. `@vN` major tags are mutable — the owner can re-point them at any
#      commit. A compromised action with publish access to npm could
#      smuggle malicious code into a release.
#   2. SHAs are immutable. We always know exactly what code ran.
#   3. Dependabot (.github/dependabot.yml) opens PRs when these SHAs go stale,
#      so we still get the convenience of major-tag tracking without the trust
#      hole — just with a review step in the middle.
# The trailing comment after each SHA shows the human-readable version it
# resolved to at pin time. Dependabot keeps both the SHA and comment in sync.

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: npm
      # Force latest npm so the runner has Trusted Publisher OIDC support and
      # staged publishing (`npm stage`, requires npm >= 11.15.0; OIDC needs
      # >= 11.5.1). Node LTS's bundled npm can lag.
      - run: npm install -g npm@latest
      - run: npm ci --ignore-scripts
      - run: npm run build

      # Stage the release instead of publishing it live. The npm-side trusted
      # publisher is configured with --allow-stage-publish ONLY (not
      # --allow-publish), so this OIDC token can stage but cannot publish — a
      # direct `npm publish` here would be denied by the registry. Nothing is
      # public until a maintainer runs `npm stage approve <id>` with 2FA.
      - id: stage
        run: |
          npm stage publish --provenance --access public --json | tee stage.json
          echo "stage_id=$(jq -r '.id // .stageId // empty' stage.json)" >> "$GITHUB_OUTPUT"

      # Notify maintainers via the BorgIQ webhook that a release is staged and
      # awaiting 2FA approval. The payload is HMAC-signed (over `<ts>.<body>`)
      # so the canvas can verify the request came from this Action before it
      # posts to Slack. We don't put a Slack secret in GitHub.
      - name: Notify BorgIQ (staged, awaiting approval)
        env:
          WEBHOOK_URL: ${{ secrets.BORGIQ_RELEASE_WEBHOOK_URL }}
          SIGNING_SECRET: ${{ secrets.BORGIQ_RELEASE_WEBHOOK_SECRET }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          STAGE_ID: ${{ steps.stage.outputs.stage_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ts=$(date +%s)
          body=$(jq -nc \
            --arg tag "$TAG" \
            --arg version "${TAG#v}" \
            --arg stage_id "$STAGE_ID" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run_url "$RUN_URL" \
            '{tag:$tag, version:$version, stage_id:$stage_id, repo:$repo, run_url:$run_url}')
          # Sign exactly "<ts>.<body>" with no trailing newline so the bytes
          # match the canvas's recomputed HMAC-SHA256 over `${ts}.${rawBody}`.
          sig=$(printf '%s' "${ts}.${body}" | openssl dgst -sha256 -hmac "$SIGNING_SECRET" | sed 's/^.*= //')
          curl -fsSL -X POST "$WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -H "x-borgiq-timestamp: ${ts}" \
            -H "x-borgiq-signature: sha256=${sig}" \
            --data "$body"
