name: ci

on:
  pull_request:
    branches: [main]

# Action references pinned to commit SHAs — see release.yml for rationale.
# Trailing comment is the version this SHA resolved to at pin time;
# Dependabot will open PRs to bump them.

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
