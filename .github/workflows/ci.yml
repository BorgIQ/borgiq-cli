name: ci

on:
  pull_request:
    branches: [main]

# Action references pinned to commit SHAs — see release.yml for rationale.
# Trailing comment is the version this SHA resolved to at pin time;
# Dependabot will open PRs to bump them.

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
